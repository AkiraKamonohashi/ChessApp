<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Pro AI</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="chessboard.css">
    <style>
        body { background: #262421; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .game-container { width: 98%; max-width: 400px; padding: 5px; }
        
        /* GPU Optimized Board */
        #board { 
            width: 100%; 
            border-radius: 3px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            overflow: hidden;
            transform: translate3d(0,0,0); /* Hardware Acceleration */
        }

        /* EXACT CHESS.COM COLORS */
        .white-1e1d7 { background-color: #ebecd0 !important; }
        .black-3c85d { background-color: #779556 !important; }

        /* Optimized Visuals - Small Dots like Chess.com */
        .dot { 
            height: 12px; width: 12px; 
            background-color: rgba(0,0,0,0.15); 
            border-radius: 50%; 
            display: block; margin: auto; 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            pointer-events: none; z-index: 100;
        }
        .square-55d63 { position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent; } 
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        
        /* VIBRANT PREMOVE */
        .premove-sq { background-color: rgba(244, 43, 31, 0.8) !important; } 

        .ui-panel { background: #312e2b; width: 92%; max-width: 380px; margin-top: 20px; padding: 12px 18px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #status { font-weight: 600; color: #81b64c; font-size: 15px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; background: #81b64c; color: #fff; font-weight: bold; cursor: pointer; }
    </style>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            // Check for updates every time the app is opened
            reg.update();
          }).catch(err => {
            console.log('Service Worker registration failed: ', err);
          });
        });
      }
    </script>
</head>
<body>
    <div id="board" class="game-container"></div>
    <div class="ui-panel">
        <div id="status">Your Turn</div>
        <button onclick="location.reload()">New Game</button>
    </div>

    <script src="jquery.js"></script>
    <script src="chess.js"></script>
    <script src="chessboard.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var moveSound = new Audio('move.mp3'); 
        var engine = new Worker('stockfish.js');
        
        var sourceSquare = null;
        var premove = null;

        moveSound.load();

        function removeVisuals() {
            $('.square-55d63').removeClass('highlight-selected');
            $('.dot').remove();
        }

        function showMoveDots(square) {
            var moves = game.moves({ square: square, verbose: true });
            moves.forEach(function(m) {
                $('.square-' + m.to).append('<div class="dot"></div>');
            });
        }

        function updateStatus() {
            var status = 'Your Turn';
            if (game.turn() === 'b') status = 'AI thinking...';
            if (game.in_checkmate()) status = 'Checkmate!';
            $status.html(status);
        }

        function executeMove(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return false;

            moveSound.play();
            board.position(game.fen(), true);
            removeVisuals();
            updateStatus();

            if (game.turn() === 'b') {
                window.requestAnimationFrame(() => {
                    setTimeout(aiMove, 250);
                });
            }
            return true;
        }

        function aiMove() {
            if (game.game_over()) return;
            engine.postMessage('position fen ' + game.fen());
            engine.postMessage('go depth 10');
            engine.onmessage = function(e) {
                if (e.data.startsWith('bestmove')) {
                    var moveStr = e.data.split(' ')[1];
                    game.move({ from: moveStr.substring(0,2), to: moveStr.substring(2,4), promotion: 'q' });
                    board.position(game.fen(), true);
                    moveSound.play();
                    updateStatus();
                    
                    if (premove) {
                        var pFrom = premove.from;
                        var pTo = premove.to;
                        premove = null;
                        $('.square-55d63').removeClass('premove-sq');
                        if (!executeMove(pFrom, pTo)) {
                            board.position(game.fen(), true);
                        }
                    }
                }
            };
        }

        function onSquareTap(square) {
            if (game.turn() === 'b') {
                if (sourceSquare && sourceSquare !== square) {
                    $('.square-55d63').removeClass('premove-sq');
                    premove = { from: sourceSquare, to: square };
                    $('.square-' + sourceSquare).addClass('premove-sq');
                    $('.square-' + square).addClass('premove-sq');
                    sourceSquare = null;
                    removeVisuals();
                } else {
                    var p = game.get(square);
                    if (p && p.color === 'w') {
                        removeVisuals();
                        sourceSquare = square;
                        $('.square-' + square).addClass('highlight-selected');
                    }
                }
                return;
            }

            if (sourceSquare) {
                if (executeMove(sourceSquare, square)) {
                    sourceSquare = null;
                    return;
                }
            }

            var piece = game.get(square);
            removeVisuals();
            
            if (piece && piece.color === 'w') {
                sourceSquare = square;
                $('.square-' + square).addClass('highlight-selected');
                showMoveDots(square);
            } else {
                sourceSquare = null;
            }
        }

        var config = {
            draggable: true,
            position: 'start',
            moveSpeed: 'fast',
            onDragStart: (source) => {
                if (game.turn() === 'b' || game.game_over()) return false;
                removeVisuals();
                sourceSquare = source;
                showMoveDots(source);
            },
            onDrop: (source, target) => {
                if (game.turn() === 'b') {
                    premove = { from: source, to: target };
                    $('.square-' + source).addClass('premove-sq');
                    $('.square-' + target).addClass('premove-sq');
                    return 'snapback';
                }
                if (!executeMove(source, target)) return 'snapback';
                sourceSquare = null;
            },
            onSnapEnd: () => board.position(game.fen()),
            pieceTheme: 'img/{piece}.png' // Assuming images are in an 'img' folder
        };

        board = Chessboard('board', config);
        
        $('#board').on('touchstart mousedown', '.square-55d63', function(e) {
            e.preventDefault(); 
            var square = $(this).attr('data-square');
            onSquareTap(square);
        });

        updateStatus();
    </script>
</body>
</html>
